name:Java CI Pipeline
on:
 push:
    branches:
     - master

jobs:
  build:

     runs-on: ubuntu-latest

  steps:

 -name:Checkout Repository     
   uses:actions.Checkout@v4

 -name:Set up JDK
   uses:actions/setup-java@v4
   with: 
      distribution: 'temurin'
      java-version: '17'

  -name: Compile java Program
   run: javac Main.java

  -name: Run Java Program
  run: java Main
